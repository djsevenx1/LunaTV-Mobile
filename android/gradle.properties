org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseParallelGC
org.gradle.parallel=true
org.gradle.caching=true
# org.gradle.configuration-cache=true

# 网络弹性: 应对国内镜像 (Aliyun/Huawei/Tencent) 间歇性 502
# 60s 连接超时, 5min socket 读超时, 600s 全局下载超时
systemProp.org.gradle.internal.http.connectionTimeout=60000
systemProp.org.gradle.internal.http.socketTimeout=300000
systemProp.org.gradle.internal.network.retry.max.attempts=5
systemProp.org.gradle.internal.network.retry.initial.backOff=1000

android.enableAppCompileTimeRClass=true
android.enableBuildConfigAsBytecode=true
android.useAndroidX=true
# Improve build performance by enabling R8 parallelism.
android.r8.maxWorkers=4

kotlin.code.style=official