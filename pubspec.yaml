name: luna_tv
description: "LunaTV-inspired Flutter client"
publish_to: 'none'
version: 2.5.50

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  http: ^1.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  web_socket_channel: ^3.0.3
  cached_network_image: ^3.3.1
  # v2.1.33: 自定义 [CacheManager] 注入 [LunaImageHttp] 走 MethodChannel.
  #   cached_network_image 3.x 删了 httpClient 参数, 必须用 cacheManager +
  #   flutter_cache_manager 的 HttpFileService(httpClient:) 注入.
  flutter_cache_manager: ^3.4.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  package_info_plus: ^8.0.0
  intl: ^0.20.2
  dio: ^5.7.0
  dlna_dart: ^0.0.5
  # v2.2.0: 卸 libmpv (media_kit) 改 ExoPlayer (AndroidX Media3).
  #   走官方 video_player 包 (Flutter 团队维护, Android 端底层是 Media3
  #   ExoPlayer 1.4.x, 跟 build.gradle 里的 media3-exoplayer 1.4.1 是
  #   同一份). media3 1.4 已经是 AndroidX 标准, 不再需要 libmpv 的 .so,
  #   包体积 -30MB.
  #   - 视频代理 URL (127.0.0.1:PORT/m3u8?url=...) 跟以前一样用,
  #     libmpv 走的就是这个 URL, ExoPlayer 也认 http://
  #   - 带宽流继续走 1s 轮询代理服务 (VideoProxyStatus 已有), 不依赖
  #     ExoPlayer Listener.onBandwidthSample (Dart 端 video_player 不暴露)
  #   - 默认硬解 (Media3 默认就是硬解 + codec 自适应, 不需要手动 hwdec=)
  #   只支持 Android+iOS, macOS/web 跟以前一样不编
  # v2.3.11: 卸 video_player 改自研 CustomExoPlayer (MethodChannel + SurfaceTexture).
  # v2.3.14: 加回 video_player, 卸自研 CustomExoPlayer. 跟 v2.3.0 行为一致.
  video_player: ^2.10.1
  screen_brightness: 0.2.2+1
  # v2.5.18: 2.0.8 → 3.4.4. 3.x 改 singleton → instance API
  #   (VolumeController() 仍兼容, 内部 .instance 拿单例), 修了
  #   Android 14+ 的 setStreamVolume FLAG_SHOW_UI 默认行为 (旧
  #   2.0.8 在 Android 16 上 showSystemUI=false 偶发失效, 3.4.4 修).
  #   选 3.4.4 是因为 3.5.0+ 要 Dart 3.10, 项目 SDK 3.4.0-4.0.0
  #   选 3.4.4 (Min Dart 3.0) 是 3.x 兼容范围内最新.
  volume_controller: 3.4.4
  # macos_window_utils: ^1.0.4
  # bitsdojo_window: ^0.1.5
  # bs58check: ^1.0.0
  lucide_icons_flutter: ^3.1.14+1
  # 编码
  gbk_codec: ^0.4.0
  # v2.5.34: 弹幕系统需要 md5 (优酷 mtop 签名) — pub 官方 crypto 包
  crypto: ^3.0.6
  # v2.2.0: 删了 dart:ffi (libmpv FFI 绑定 MpvFFI 没了, ExoPlayer 是纯原生 AndroidX)

  # gal: ^2.0.1
  # app_settings: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
