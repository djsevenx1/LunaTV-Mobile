name: luna_tv
description: "LunaTV-inspired Flutter client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  http: ^0.13.5
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  web_socket_channel: ^2.4.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  package_info_plus: ^4.0.0
  intl: 0.18.1
  dlna_dart: ^0.0.5
  media_kit: ^0.9.0
  media_kit_video: ^0.9.0
  media_kit_libs_video: ^0.9.0
  screen_brightness: ^0.2.2
  volume_controller: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
