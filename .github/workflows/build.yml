name: Build APK

on:
  push:
    branches: [ main, 'trae/**' ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platform-tools"
          sdkmanager "ndk;29.0.14033849"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - run: flutter pub get

      # tag 触发时, 把 git tag 同步到 pubspec.yaml (build.gradle.kts 解析 pubspec 拿 version)
      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ "$TAG" == *"+"* ]]; then
            VERSION=${TAG%+*}
            BUILD=${TAG#*+}
            sed -i "s/^version: .*/version: $VERSION+$BUILD/" pubspec.yaml
          else
            sed -i "s/^version: .*/version: $TAG+1/" pubspec.yaml
          fi
          head -5 pubspec.yaml

      # release 签名: keystore 已提交在 android/app/release.keystore
      # build.gradle.kts 直接读取, 每次 CI 构建签名一致
      # 镜像 502 时 Flutter 会自动重试 1 次, 但 Aliyun/Huawei/Tencent 同步挂的时候
      # 重试不够, 这里用 nick-fields/retry 兜底网络瞬时故障
      - name: Run flutter build apk --release
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          retry_wait_seconds: 30
          timeout_minutes: 60
          command: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/app-release.apk

      # softprops 在已存在 release 上也会调 updateRelease 并把 body 传成 undefined,
      # 把 body 清空; 必须在它之后再用 github-script 把当前 tag 的 changelog 写回去
      - name: Set release body
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v6
        with:
          script: |
            const tagName = context.ref.replace('refs/tags/', '');
            // 各版本 changelog 集中在这里, 后续 v1.0.30 直接 push 这个 array 就行
            const changelogs = {
              'v1.0.38': `## 更新日志

            ### 🐛 修复

            - **平板选集卡片过大**
              - 现象: iPad 上「选集」区每张卡片宽度约 200dp、文字 11px 居中显空, 看着像 12 个大格子稀疏排开
                - [player_screen.dart](file:///workspace/lib/screens/player_screen.dart) \`_buildEpisodeSection\` 写死 \`crossAxisCount: 6\`, 平板 1300+ 宽度下每张卡片巨大
                - 底部抽屉选集同样写死 \`crossAxisCount: 5, childAspectRatio: 1.4\`, 平板打开也是几个大块
              - 修复: 套 [LayoutBuilder](file:///workspace/lib/screens/player_screen.dart), 按宽度动态算列数
                - 详情选集: <600 6 列 / <900 8 列 / <1200 10 列 / ≥1200 12 列
                - 卡片宽 < 80dp 时 \`childAspectRatio\` 1.2 + 字号 11; 否则 1.0 + 字号 12
                - 底部抽屉选集: <500 5 列 / <800 8 列 / <1100 10 列 / ≥1100 12 列
              - 结果: 平板选集变成 12 列紧凑方形, 一次能看 24 集, 不再是几个大空格

            ### 🎨 体验改进

            - **首页轮播图海报清晰度**
              - 现象: iPad 上一打开首屏 hero banner 海报明显发糊, 字体边缘能看出马赛克
              - 原因: [hero_banner.dart](file:///workspace/lib/widgets/hero_banner.dart) [CachedNetworkImage](file:///workspace/lib/widgets/hero_banner.dart) 用默认 \`FilterQuality.medium\`, 源图被放大到 2~3 倍时重采样质量不够
              - 修复:
                - 加 \`filterQuality: FilterQuality.high\` (高质量重采样)
                - 加 \`gaplessPlayback: true\` (切图时无白闪)
                - 把 \`memCacheWidth\` 改成 banner 实际显示宽度 (减掉左右 12 边距), 跟之前用整屏宽略有差异, 解码更精准

            ---`,
              'v1.0.37': `## 更新日志

            ### 🎨 体验改进

            - **快进/快退按钮: 圆弧箭头 → 文字 -60 / +60**
              - 之前 [player_screen.dart](file:///workspace/lib/screens/player_screen.dart) 用 [CustomPaint](file:///workspace/lib/screens/player_screen.dart#L1812-L1830) 自绘 YouTube 风格的圆弧箭头 + 三角形尾巴, 实际观感像"刷新/循环"图标, 跟"快进"语义不符
              - 改为静态文字 "-60" / "+60", 白字 18px w700, 居中放在同一个 56/64px 毛玻璃圆按钮里
              - 删掉约 40 行的 [\_ArcArrowPainter](file:///workspace/lib/screens/player_screen.dart) 自定义 painter
              - 留一个 [\_SeekLabel](file:///workspace/lib/screens/player_screen.dart) StatelessWidget, 复用同一个文字样式

            ### ✨ 新增功能

            - **自动播放下一集**
              - 之前 v1.0.34 回退时, 注释里写"不再自动播下一集, 由用户控制" ([player_screen.dart](file:///workspace/lib/screens/player_screen.dart) 旧 160 行), 但实际上用户本来就应该拿"继续看"体验
              - 监听 [streams.position](file:///workspace/lib/screens/player_screen.dart) + [streams.duration](file:///workspace/lib/screens/player_screen.dart), 距离结尾 < 1.5s 时自动调 [\_playEpisode](file:///workspace/lib/screens/player_screen.dart) 切到下一集
              - 兜底: 监听 [streams.completed](file:///workspace/lib/screens/player_screen.dart), 部分源 position 不走完会直接发 completed
              - 加 [\_autoPlayedThisEpisode](file:///workspace/lib/screens/player_screen.dart) 标志防止 position + completed 双触发
              - 最后一集播完停在播放页, 不再继续

            ### ✅ 行为确认

            - **全屏手势: 左侧上下 = 亮度, 右侧上下 = 音量**
              - [mobile_player_controls.dart](file:///workspace/lib/widgets/mobile_player_controls.dart) \`_buildGestureLayer\` 把屏幕横分 3 段 (1:2:1), 左 1/3 绑 \`_onBrightnessSwipeXxx\`, 右 1/3 绑 \`_onVolumeSwipeXxx\`
              - 用户反馈"左边是亮度调节 右边是声音调节"就是预期, 这部分代码之前已经正确, 不需要改动

            ---`,
              'v1.0.36': `## 更新日志

            ### 🐛 修复

            - **平板模式下短剧卡片视觉问题**（v1.0.35 列数修复后引入）
              - 现象：v1.0.35 把平板列数从 3 列改成 6~8 列后，每张卡片变窄，但卡片内部字号没相应缩放
                - 集数胶囊 "X集" 字号还是 10、padding 6/3，在 135~185px 的窄卡片上占比偏大
                - 评分胶囊堆叠在集数胶囊下方 (top:28)，把海报左上角纵向占掉 ~50px
              - 修复：
                - [short_drama_card.dart](file:///workspace/lib/widgets/short_drama_card.dart) 内部字号/padding 按 \`width < 200\` 阈值缩放
                  - 集数胶囊字号 10→9，padding 6/3→4/2
                  - 评分胶囊同上，星标 icon 10→8
                  - 海报底部标题 12→11
                  - 更新时间字号 10→9，外层 SizedBox 6→4
                - 阈值 200 覆盖手机(~100)+平板(135~185)，PC 大卡(>300)保持原大小
                - 评分胶囊从 left:4 top:28 移到 right:4 top:4，避免和集数胶囊堆叠挤占海报
              - [short_drama_screen.dart](file:///workspace/lib/screens/short_drama_screen.dart) 网格层面同步调整
                - \`mainAxisSpacing\` 平板/手机下 16→12，让窄卡视觉更紧凑
                - \`childAspectRatio\` 中文字区高度按 \`cardWidth < 200\` 从 22→16，与卡片内字号缩放对齐

            ### 🛠 实现细节

            - 字号缩放阈值统一用 \`width < 200\`，覆盖手机 + 平板所有列数；PC 大卡不触发
            - 评分胶囊移到右上角，与 [video_card.dart](file:///workspace/lib/widgets/video_card.dart) 电视剧卡片保持一致

            ---`,
              'v1.0.35': `## 更新日志

            ### 🐛 修复

            - **短剧页面平板视频列数异常**
              - 之前 [short_drama_screen.dart](file:///workspace/lib/screens/short_drama_screen.dart) 的 \`_buildDramaGrid\` 只区分 PC / 非 PC 两支，非 PC 一律 3 列
              - 平板被归到非 PC 分支，宽度 800+ 也只显示 3 张大卡片，每张被拉得很大（图 1）
              - 电视剧页面用的 [douban_movies_grid.dart](file:///workspace/lib/widgets/douban_movies_grid.dart) 调的是 \`DeviceUtils.getTabletColumnCount()\`，宽度 1000/1200 阈值动态返回 6/7/8 列
              - 短剧页补一个 \`DeviceUtils.isTablet(context)\` 分支，调用 \`getTabletColumnCount()\` 复用同一套列数算法，跟电视剧页观感一致
              - 顺手把非 PC 分支的 \`spacing\` 从 10 调到 12、padding 从 12 调到 16，跟电视剧页对齐

            ### 🛠 实现细节

            - 三段分支：\`isPC\` → 4~6 列；\`isTablet\` → 6~8 列；其他（手机）→ 3 列
            - 共享同一个 \`getTabletColumnCount\`，以后平板列数规则要改只动 [device_utils.dart](file:///workspace/lib/utils/device_utils.dart) 一处

            ---`,
              'v1.0.34': `## 更新日志

            ### 🛠 回退

            - **回退到 v1.0.29 状态** (\`f6db9f6\`)
              - v1.0.30 ~ v1.0.33 引入的 \`autoPlay\` 模式有缺陷:
                - 历史/收藏点开先卡 "正在恢复播放" loading
                - 从播放页按系统返回又卡一次 "正在恢复播放" (autoPlay + _phase=detail 命中)
                - 修了 3 版没修干净, 干脆回退到 v1.0.29 (没有 autoPlay)
              - v1.0.29 的核心能力 (云记忆恢复源 + 进度) 保留:
                - 从"继续观看"点进去, 自动选历史源 + 自动定位到第 N 集 + 播放时 seek 到 playTime
                - 入口还是先到选源详情页 (\`autoPlay: false\`), 用户手动点"播放"按钮, 但选源 + 进度都预填好了
              - 历史/收藏点开: 详情页打开 → 源/集/进度都是上次记录 → 点"播放"直接续播

            ---`,
              'v1.0.29': `## 更新日志

            ### ✨ 新增功能

            - **云记忆恢复播放源 + 进度**
              - 之前 [player_screen.dart](file:///workspace/lib/screens/player_screen.dart) 打开视频时只用 \`videoInfo.preferredSource\` 选源、\`_currentEpisodeIndex\` 永远从 0 开始，压根没读云端 \`/api/playrecords\`
              - 结果从"继续观看"卡片点进来，源被重置到默认第一个、进度归零
              - 现在 \`_loadSources()\` 启动时主动调 \`PageCacheService().getPlayRecords()\`，按 \`searchTitle\` 匹配最近一条云记录
                - 拿到 \`source\` → 选源时优先用云记忆的源
                - 拿到 \`index\` → \`_selectSource(episodeIndex:)\` 直接定位到第 N 集
                - 拿到 \`playTime\` → \`_playEpisode()\` 开 media 后 \`await _player.seek(Duration(milliseconds: playTime))\` 跳到上次位置
              - 行为跟上游 [MoonTV web play/page.tsx](https://github.com/senshinya/MoonTV) 对齐（那边也是 \`getAllPlayRecords() + searchTitle\` 匹配）

            ### 🛠 实现细节

            - 新字段 \`_pendingResumeAt: Duration?\` 暂存待 seek 的位置，\`_playEpisode()\` 用完即清，避免切下一集时误触发
            - 入口 \`videoInfo.source\` 非空时优先用其值（点击"继续观看"走的链路），为空时再走云端兜底
            - 云端查询失败 / 没记录时静默回退到默认行为，不打断播放

            ---

            配套：[CORSAPI](https://github.com/djsevenx1/CORSAPI) Worker 已加 \`bgm.tv\` 自动补 UA + Referer 兜头（commit \`87435d7\`），如果上次 CF 代理 Bangumi 加载不出来，重新部署一次最新 \`_worker.js\` 即可。`,
            };
            const body = changelogs[tagName] || `Release ${tagName}`;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
            });
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: body,
            });
            core.info(`set body for ${tagName} (id=${release.data.id}, ${body.length} chars)`);
