name: Build APK

on:
  push:
    branches: [ main, 'trae/**' ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platform-tools"
          sdkmanager "ndk;29.0.14033849"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - run: flutter pub get

      # tag 触发时, 把 git tag 同步到 pubspec.yaml (build.gradle.kts 解析 pubspec 拿 version)
      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ "$TAG" == *"+"* ]]; then
            VERSION=${TAG%+*}
            BUILD=${TAG#*+}
            sed -i "s/^version: .*/version: $VERSION+$BUILD/" pubspec.yaml
          else
            sed -i "s/^version: .*/version: $TAG+1/" pubspec.yaml
          fi
          head -5 pubspec.yaml

      # release 签名: keystore 已提交在 android/app/release.keystore
      # build.gradle.kts 直接读取, 每次 CI 构建签名一致
      # 镜像 502 时 Flutter 会自动重试 1 次, 但 Aliyun/Huawei/Tencent 同步挂的时候
      # 重试不够, 这里用 nick-fields/retry 兜底网络瞬时故障
      - name: Run flutter build apk --release
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          retry_wait_seconds: 30
          timeout_minutes: 60
          command: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/app-release.apk

      # softprops 在已存在 release 上也会调 updateRelease 并把 body 传成 undefined,
      # 把 body 清空; 必须在它之后再用 github-script 把当前 tag 的 changelog 写回去
      - name: Set release body
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v6
        with:
          script: |
            const tagName = context.ref.replace('refs/tags/', '');
            // 各版本 changelog 集中在这里, 后续 v1.0.30 直接 push 这个 array 就行
            const changelogs = {
              'v1.0.49': `## 更新日志

            ### 🎨 体验改进

            - **播放历史合并同一影片多源记录**
              - 现象: 同一个电影 (比如"蜘蛛侠") 在源 A 看过、源 B 也看过, 历史里会显示两条一样的卡片, 列表显得重复
              - 修复 ([history_grid.dart](file:///workspace/lib/widgets/history_grid.dart)):
                - 新增 \`_dedupeByMovie()\`, 以 \`searchTitle\` (或 \`title\` 兜底) 为 key 合并多源记录
                - 同一影片只显示一条卡片, 用 \`saveTime\` 最新的源作为主代表 (用户最近看的源)
                - 全部源记录保留在 \`_recordSourceMap\`, 方便 \`removeHistoryFromUI\` 按 (source, id) 删
                - UI 用 \`_dedupedRecords\` 渲染, \`build()\` 空状态判断也跟着改
              - 原始 \`_playRecords\` 仍保留全量, 删条目时同步从 map 移除并重算 dedup

            - **首页「继续观看」同样合并同一影片多源 (v1.0.48 dedup 字段未接 UI, v1.0.49 修)**
              - 现象: 首页"继续观看"区, 同一个电影多源看过也显示多条
              - 根因 ([continue_watching_section.dart](file:///workspace/lib/widgets/continue_watching_section.dart)):
                - v1.0.48 加了 \`_dedupedRecords\` / \`_recordSourceMap\` 字段和 \`_dedupeByMovie()\`,
                  也设了 dedup 结果
                - 但 \`ListView.builder\` 还用 \`_playRecords\` 渲染, 空状态判断也用 \`_playRecords\`,
                  等于 dedup 字段是死代码
                - \`removePlayRecordFromUI\` 也只删 \`_playRecords\`, 不重算 dedup
              - 修复 (本版本):
                - \`ListView.builder\` \`_playRecords\` → \`_dedupedRecords\`, 间距判断跟着改
                - \`build()\` 空状态 \`_playRecords.isEmpty\` → \`_dedupedRecords.isEmpty\`
                - \`removePlayRecordFromUI\` 同步从 \`_recordSourceMap\` 移除并重算 dedup
                - 跟 [history_grid.dart](file:///workspace/lib/widgets/history_grid.dart) 同模板

