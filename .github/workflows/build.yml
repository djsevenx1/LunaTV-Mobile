                - \`onPopInvoked\` 有两个分支:
                  1. \`!didPop && phase==playing\`: save(12分钟) → stop → 回到 detail
                  2. \`didPop && phase==detail\`: 又调 \`save(force=true)\`
                - 但第二次 save 时 player 已经 stop, \`state.position\` 和 \`_currentPosition\`
                  都是 0 (stop 后 position stream 发射 0, _currentPosition 跟着变 0)
                - 第二次 save 存了 \`playTime=0\`, **覆盖了第一次 save 的 12 分钟**
                - 下次打开云端拉到 \`playTime=0\` → 从 0 开始
              - 修复:
                - \`didPop && phase==detail\` 分支不再调 \`_saveCurrentProgress\`
                - 进度在 playing→detail 转换时已经存过, 退出详情页不需要再存

            - **修复 dispose 时二次 save 覆盖进度 (根因 3, v1.0.50.1 补)**
              - 现象: v1.0.50 第二版关了 onPopInvoked 详情分支的 save, 用户测试
