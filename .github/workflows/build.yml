name: Build APK

on:
  push:
    branches: [ main, 'trae/**' ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platform-tools"
          sdkmanager "ndk;29.0.14033849"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - run: flutter pub get

      # tag 触发时, 把 git tag 同步到 pubspec.yaml (build.gradle.kts 解析 pubspec 拿 version)
      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ "$TAG" == *"+"* ]]; then
            VERSION=${TAG%+*}
            BUILD=${TAG#*+}
            sed -i "s/^version: .*/version: $VERSION+$BUILD/" pubspec.yaml
          else
            sed -i "s/^version: .*/version: $TAG+1/" pubspec.yaml
          fi
          head -5 pubspec.yaml

      # release 签名: keystore 已提交在 android/app/release.keystore
      # build.gradle.kts 直接读取, 每次 CI 构建签名一致
      # 镜像 502 时 Flutter 会自动重试 1 次, 但 Aliyun/Huawei/Tencent 同步挂的时候
      # 重试不够, 这里用 nick-fields/retry 兜底网络瞬时故障
      - name: Run flutter build apk --release
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          retry_wait_seconds: 30
          timeout_minutes: 60
          command: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/app-release.apk

      # softprops 在已存在 release 上也会调 updateRelease 并把 body 传成 undefined,
      # 把 body 清空; 必须在它之后再用 github-script 把当前 tag 的 changelog 写回去
      - name: Set release body
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v6
        with:
          script: |
            const tagName = context.ref.replace('refs/tags/', '');
            // 各版本 changelog 集中在这里, 后续 v1.0.30 直接 push 这个 array 就行
            const changelogs = {
              'v1.0.75': `## 更新日志

            ### 🐛 修复

            - **播放到一定时候会突然回到 0:00 重新播放 (libmpv m3u8 reload)**
              - 现象: 播放途中, 进度条瞬间归零, 时间码显示 0:00, 视频从开头重新开始,
                之前看到的位置丢失, 必须手动拖进度条回去. 跟"开 CF 看不到下载速度"
                同期出现, 但跟 CF 开关无强相关 (libmpv / m3u8 HLS demuxer 自身行为).
              - 根因 ([player_screen.dart#streams.position](file:///workspace/lib/screens/player_screen.dart#L190)):
                - m3u8 HLS 媒体流 (e.g. CF worker 转发的 m3u8) 在某些场景下,
                  libmpv 内部 HLS demuxer 遇到 segment 加载失败 / 超时 / playlist 刷新
                  → 自动重新 open 整个 manifest 流
                - 重新 open 完, state.position 跳回 0, streams.position 立刻发射 0
                - 之前 _currentPosition 已经被 stream 重置, UI 立即显示 "0:00 / 30:00"
                - video 从 0 重新开始播放, 进度条归零, 之前看的位置全部丢失
                - 用户被迫手动拖进度条跳回原位置 (用户最近反馈"重播后得手动快进")
              - 修法: position jump recovery
                - [player_screen.dart](file:///workspace/lib/screens/player_screen.dart) 新增 \`_lastKnownPosition\`
                  跟踪 libmpv 上次发射的非 0 position. _currentPosition 本身在 reload
                  期间被 stream 发射 0 重置, 单独维护一个兜底.
                - streams.position 监听里检测"非用户主动"的位置跳变:
                  上一帧 wasPos >= 30s + 这一帧 pos < 5s + _isPlaying + cooldown 2s
                  → 自动 \`_player.seek(wasPos)\` 跳回原位置
                - 4 个守门条件避免误判:
                  1. \`_scrubbingValue == null\` — 用户没在拖进度条
                  2. \`wasPos >= 30s\` — 已经播了至少 30 秒 (刚 open 那一刻不触发)
                  3. \`pos < 5s\` — 跳到接近 0 的位置 (不是普通前进/后退)
                  4. cooldown 2s — 防止 libmpv seek 过程中反复触发
                - 配套: [_saveCurrentProgress](file:///workspace/lib/screens/player_screen.dart#L1075) 加
                  \`_lastKnownPosition\` 兜底, 避免 reload 期间 10s 定时器把云端进度覆盖成 0
                - 配套: [_playEpisode](file:///workspace/lib/screens/player_screen.dart#L1520) 切集时重置
                  \`_lastKnownPosition = 0\`, 避免上一集的位置被新一集沿用
              - 验证:
                1. 装 v1.0.75 → 播放任意 m3u8 源
                2. 等待 ≥ 30s 让 _lastKnownPosition 增长
                3. 触发 m3u8 reload (e.g. 切网络 / 模拟弱网 / 等待长视频 segment fail)
                4. 预期: 视频自动 seek 回原位置继续播, 进度条不归零
                5. 用户手动快进/快退不受影响 (cooldown 2s + _scrubbingValue 守门)

            ---`,
              'v1.0.74': `## 更新日志

