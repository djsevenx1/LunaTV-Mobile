                - 但 position stream 还没回传, \`state.position\` 和 \`_currentPosition\` 都还是 0
                - \`state.playing=true\` 命中条件 → 存了一条 \`playTime=0\` 的记录
                - 这条 \`playTime=0\` **覆盖了云端 12 分钟那条**
                - 下次重开云端拉到 \`playTime=0\`, \`_pendingResumeAt=null\`, 从 0 开始
              - 修复:
                - \`_playEpisode\` 里 \`_saveCurrentProgress()\` 加 \`if (resumeAt == null)\` 条件
                - resume 场景 (有 \`_pendingResumeAt\`) 跳过这次立即 save,
                  让 10s 定时器第一次 tick 时再存 (那时 position stream 已回传 > 0)
                - 非 resume 场景 (新集/切集) 保留立即 save 标记已开始
              - 这是 v1.0.50 真正的根因修复, 之前的 didChangeAppLifecycleState
                + dispose await + local 双写都是加固, 这个才是用户报告的
