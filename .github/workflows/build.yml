              - 现象: 中央三个圆按钮 (播放/暂停 + ±60) 之前用 \`kLunaFloatBtnBg\` (白色 15% 透明),
                跟左右调出来的亮度/音量浮窗 (\`Colors.black.withOpacity(0.7)\`) 风格不一致
              - 修复 ([player_screen.dart](file:///workspace/lib/screens/player_screen.dart)):
                - \`_buildSeekCircleButton\` 背景 \`kLunaFloatBtnBg\` → \`Colors.black.withOpacity(0.7)\`
                - 文字/图标保持白色不变
              - 效果: 一眼能看出是浮层风格, 跟调亮度音量浮窗配色一致

            - **中央 ±60s 按钮往中间挪一点**
              - 现象: 之前 \`sideOffset\` 是 60/80 (竖屏/全屏), ±60 按钮离屏幕边有点远,
                看着分散
              - 修复 ([player_screen.dart](file:///workspace/lib/screens/player_screen.dart)):
                - \`sideOffset\` 60/80 → 40/60 (竖屏/全屏, 都缩 20px)
                - 按钮中心到中央播放按钮距离: 88/112px → 68/92px

