name: Build APK

on:
  push:
    branches: [ main, 'trae/**' ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platform-tools"
          sdkmanager "ndk;29.0.14033849"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - run: flutter pub get

      # tag 触发时, 把 git tag 同步到 pubspec.yaml (build.gradle.kts 解析 pubspec 拿 version)
      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ "$TAG" == *"+"* ]]; then
            VERSION=${TAG%+*}
            BUILD=${TAG#*+}
            sed -i "s/^version: .*/version: $VERSION+$BUILD/" pubspec.yaml
          else
            sed -i "s/^version: .*/version: $TAG+1/" pubspec.yaml
          fi
          head -5 pubspec.yaml

      # release 签名: keystore 已提交在 android/app/release.keystore
      # build.gradle.kts 直接读取, 每次 CI 构建签名一致
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      # Tag 触发: 创建/更新 GitHub Release 并上传 APK
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 更新日志

            ### ✨ 新增功能

            - **加回最简 CF Worker 加速**（开关 + 域名配置）
              - 通用代理 `buildProxiedUrl()`：根据链接类型自动选 `/?url=` 或 `/m3u8?url=` 端点
              - CORSAPI 加 `/m3u8?url=` 端点：拉 m3u8 后把 `.ts` 段链接重写到 worker 自身，支持 master playlist 递归
              - 播放器源测速走 worker，测得延迟更接近用户实际播放延迟

            - **Bangumi 数据/图片代理**
              - 数据源 3 选 1：直连 / Cors Proxy By Zwei (`ciao-cors.is-an.org`) / CF Worker 加速
              - 图片源 2 选 1：直连 / CF Worker 加速
                - ciao-cors 对 `lain.bgm.tv` 返 403，所以图片必须走自己的 CF Worker
              - **Bangumi 代理不受 CF Worker 加速开关控制**，只要域名配置了就生效

            - **检查更新修复**
              - `version_service.dart` 之前查的是 `MoonTechLab/LunaTV`（错的）
              - 改为 `djsevenx1/LunaTV-Mobile`，检查更新恢复正常

            ### 🐛 Bug 修复

            - `player_screen.dart` 补 `user_data_service.dart` import
              - v1.0.22 第一次构建失败原因：`_pingSource` 调 `UserDataService.buildProxiedUrl` 但 import 漏了
            - Bangumi 代理逻辑：之前受 `cf_worker_enabled` 开关控制，开关关就连域名都不读
              - 现在只判域名是否非空，配置即生效

            ### 🛠 技术细节

            - **CORSAPI**（CF Worker 代理后端）
              - 新增 `/?url=` 通用代理端点
              - 新增 `/m3u8?url=` 端点，自动重写 `.ts` 子链接为 `worker/?url=...`
              - 自带 self-fetch 循环检测

            - **数据流**（以 Bangumi 日历为例）
              ```
              app
              → https://<user-worker>.workers.dev/?url=https%3A%2F%2Fapi.bgm.tv%2Fcalendar
                → CF Worker (CORSAPI) fetch api.bgm.tv/calendar
                  → 拿 JSON 返回给 app
              ```

            - **不包含**（和之前方案对比）
              - 不测优选 IP
              - 不起本地代理 server
              - 不查 CF Anycast 池
              - worker 域名走 Anycast 路由，简单可靠

            ---

            ### 📦 配套部署

            1. 部署 CORSAPI 到 Cloudflare Worker：https://github.com/djsevenx1/CORSAPI
            2. 在 App 菜单填入 worker 域名（如 `xxx.workers.dev`）
            3. 播放器测速自动走 worker
            4. Bangumi 数据/图片自动走 worker

            ---

            安装提示：覆盖安装 v1.0.21 不会丢数据（仅修 build 流程）。
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
