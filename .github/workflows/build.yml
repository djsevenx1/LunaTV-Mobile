                2. \`_testSourceSpeed\` 直接 \`buildProxiedUrl\` 拿 URL, 拿不到就 = 测原 URL
                3. CF on 时:
                   - M3U8 链接 → worker /m3u8 端点 → 真测 CF 加速
                   - 直链 → worker / 端点 → 真测 CF 加速
