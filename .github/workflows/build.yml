              'v1.0.67': `## 更新日志

            ### 🐛 修复

            - **v1.0.66 测速"开不开 CF 结果一样" ([player_screen.dart#_testSourceSpeed](file:///workspace/lib/screens/player_screen.dart))**
              - 现象: v1.0.66 我加了"proxied 失败回退原始 URL" 想兜底, 结果用户
