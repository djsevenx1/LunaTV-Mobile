                4. 一次测速外层 4s timeout 经常不够 → 触发 fallback \`_fallbackHeadPing\`
                5. fallback 只 HEAD 测一次 ms, **没有 downloadSpeed** → \`formatLoadSpeed()\`
                   返回空 → 拼起来只剩 "Xms"
