              'v1.0.34': `## 更新日志

            ### 🛠 回退

            - **回退到 v1.0.29 状态** (\`f6db9f6\`)
              - v1.0.30 ~ v1.0.33 引入的 \`autoPlay\` 模式有缺陷:
                - 历史/收藏点开先卡 "正在恢复播放" loading
                - 从播放页按系统返回又卡一次 "正在恢复播放" (autoPlay + _phase=detail 命中)
                - 修了 3 版没修干净, 干脆回退到 v1.0.29 (没有 autoPlay)
              - v1.0.29 的核心能力 (云记忆恢复源 + 进度) 保留:
                - 从"继续观看"点进去, 自动选历史源 + 自动定位到第 N 集 + 播放时 seek 到 playTime
                - 入口还是先到选源详情页 (\`autoPlay: false\`), 用户手动点"播放"按钮, 但选源 + 进度都预填好了
              - 历史/收藏点开: 详情页打开 → 源/集/进度都是上次记录 → 点"播放"直接续播

