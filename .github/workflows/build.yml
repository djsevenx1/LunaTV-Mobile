              - 根因 ([player_screen.dart](file:///workspace/lib/screens/player_screen.dart) \`_testAllSourcesInBackground\`):
                - \`_loadSources\` 里从 \`widget.videoInfo.index\` 算出 \`resumeIndex\` 传给 \`_selectSource\`, 本来是对的
                - **但** 测速完成后, \`_testAllSourcesInBackground\` 会自动选"最快源" (用于从搜索进入的场景)
                - 自动选源时调 \`_selectSource(src)\` **不传 episodeIndex**, \`_selectSource\` 默认 \`episodeIndex = 0\`
                - 历史上看的源 ≠ 测出来的最快源 (CDN 速度不同) → 触发自动切源 → episode 被重置成 0
              - 修复:
                - 在 \`_testAllSourcesInBackground\` 里判断 \`cameFromHistory = videoInfo.source 非空 且 index > 0\`
                - 从历史进来的: **跳过自动选源**, 只按测速重排源列表 (用户可手动切), 防止 episode 被重置
