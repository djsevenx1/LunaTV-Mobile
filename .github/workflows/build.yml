              'v1.0.29': `## 更新日志

            ### ✨ 新增功能

            - **云记忆恢复播放源 + 进度**
              - 之前 [player_screen.dart](file:///workspace/lib/screens/player_screen.dart) 打开视频时只用 \`videoInfo.preferredSource\` 选源、\`_currentEpisodeIndex\` 永远从 0 开始，压根没读云端 \`/api/playrecords\`
              - 结果从"继续观看"卡片点进来，源被重置到默认第一个、进度归零
              - 现在 \`_loadSources()\` 启动时主动调 \`PageCacheService().getPlayRecords()\`，按 \`searchTitle\` 匹配最近一条云记录
                - 拿到 \`source\` → 选源时优先用云记忆的源
                - 拿到 \`index\` → \`_selectSource(episodeIndex:)\` 直接定位到第 N 集
                - 拿到 \`playTime\` → \`_playEpisode()\` 开 media 后 \`await _player.seek(Duration(milliseconds: playTime))\` 跳到上次位置
              - 行为跟上游 [MoonTV web play/page.tsx](https://github.com/senshinya/MoonTV) 对齐（那边也是 \`getAllPlayRecords() + searchTitle\` 匹配）

            ### 🛠 实现细节

            - 新字段 \`_pendingResumeAt: Duration?\` 暂存待 seek 的位置，\`_playEpisode()\` 用完即清，避免切下一集时误触发
            - 入口 \`videoInfo.source\` 非空时优先用其值（点击"继续观看"走的链路），为空时再走云端兜底
            - 云端查询失败 / 没记录时静默回退到默认行为，不打断播放

            ---

            配套：[CORSAPI](https://github.com/djsevenx1/CORSAPI) Worker 已加 \`bgm.tv\` 自动补 UA + Referer 兜头（commit \`87435d7\`），如果上次 CF 代理 Bangumi 加载不出来，重新部署一次最新 \`_worker.js\` 即可。`,
            };
            const body = changelogs[tagName] || `Release ${tagName}`;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
            });
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: body,
            });
            core.info(`set body for ${tagName} (id=${release.data.id}, ${body.length} chars)`);
