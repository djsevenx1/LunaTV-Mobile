            - **短剧页面平板视频列数异常**
              - 之前 [short_drama_screen.dart](file:///workspace/lib/screens/short_drama_screen.dart) 的 \`_buildDramaGrid\` 只区分 PC / 非 PC 两支，非 PC 一律 3 列
              - 平板被归到非 PC 分支，宽度 800+ 也只显示 3 张大卡片，每张被拉得很大（图 1）
              - 电视剧页面用的 [douban_movies_grid.dart](file:///workspace/lib/widgets/douban_movies_grid.dart) 调的是 \`DeviceUtils.getTabletColumnCount()\`，宽度 1000/1200 阈值动态返回 6/7/8 列
              - 短剧页补一个 \`DeviceUtils.isTablet(context)\` 分支，调用 \`getTabletColumnCount()\` 复用同一套列数算法，跟电视剧页观感一致
