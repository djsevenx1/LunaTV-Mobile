                - \`_onVolumeSwipeUpdate\` 改成 \`baseline + 累计 dy / 屏高 × 1.0\` (跟亮度同模板)
                - 删掉 2.0 灵敏度系数, 跟亮度保持一致

            ### 🎨 视觉微调

