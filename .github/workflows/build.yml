name: Build APK

on:
  push:
    branches: [ main, 'trae/**' ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platform-tools"
          sdkmanager "ndk;29.0.14033849"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - run: flutter pub get

      # release 签名: keystore 已提交在 android/app/release.keystore
      # build.gradle.kts 直接读取, 每次 CI 构建签名一致
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      # 拷贝 APK 到 release 目录, 提交到仓库供直接下载
      - name: Copy APK to release directory
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/lunatv-${GITHUB_REF_NAME}.apk
          cp build/app/outputs/flutter-apk/app-release.apk release/lunatv-latest.apk
          cat > release/README.md << 'EOF'
          # LunaTV Mobile Releases

          下载最新版本: [lunatv-latest.apk](./lunatv-latest.apk)
          EOF
          echo "APK copied to release/"
          ls -la release/

      - name: Push APK to release branch
        if: startsWith(github.ref, 'refs/tags/v')
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: release
          build_dir: release
          commit_message: "release: ${{ github.ref_name }}"
          force_orphan: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
