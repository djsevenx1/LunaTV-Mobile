                - 这次 save 存了 \`playTime=0\`, **覆盖了 onPopInvoked 存的 12 分钟**
                - 下次打开云端拉到 \`playTime=0\` → 从 0 开始
              - 修复:
                - \`_disposeAndSave()\` 加 \`_phase == 'playing'\` 守门
                - phase='detail' 时 (说明 onPopInvoked 已经存过) 不再重复 save
                - phase='playing' 时 (上滑杀 App / 系统回收等异常退出) 仍要 save,
