              - 根因 ([player_screen.dart](file:///workspace/lib/screens/player_screen.dart)):
                - \`dispose()\` 里 \`_saveCurrentProgress(force: true)\` 没 await, fire-and-forget
                - 然后同步 \`_player.stop()\` 把 state.position 重置成 0
                - \`super.dispose()\` 立即返回, 那笔 fire-and-forget 走网络没完成就被切断
                - 即便 \`_currentPosition\` 兜底拿到了 12 分钟, PageCacheService().savePlayRecord
                  那笔 await 也没机会 await 完, playTime 没写盘
                - home 键走 AppLifecycleState.paused 但代码没监听, 靠 10s progressTimer 救场,
                  进度没在 10s 内就被上滑杀的话还是丢
              - 修复 (本版本):
                - \`_PlayerScreenState\` 加 \`with WidgetsBindingObserver\`
                - \`didChangeAppLifecycleState\`: paused/inactive/hidden 时立即 \`unawaited _saveCurrentProgress(force: true)\`
                - \`dispose()\` 改成 \`unawaited _disposeAndSave()\`, 内部串行 await \`save → stop → dispose\`
                - 进程上滑杀时 OS 给 grace period, 大概率能完成网络写盘
                - 配套: \`dispose()\` 里 \`WidgetsBinding.instance.removeObserver(this)\` 防泄漏

            - **进度保存双写 local 兜底 (paused/杀 App 后网络没完成也保得住)**
              - 现象: v1.0.50 第一版只加了 didChangeAppLifecycleState 监听
                + dispose 串行 await, 但都是 unawaited / fire-and-forget 走网络
                - 普通用户 home 键切后台, 5s 内 OS 杀 App 是常态
                - ApiService.savePlayRecord 走 HTTP 几十~几百 ms, **5s 内能完成**
                - 但 Android 12+ 杀后台激进, 部分机型 1-2s 内就杀, **网络请求来不及完成**
                - 用户测试: home 键切后台, 重开 → playTime 还是 0 (云端没写)
              - 根因: paused 触发时只能 fire-and-forget, 不能 await (回调是 void 同步),
                即便 OS grace period 也可能被激进杀后台策略打断
              - 修复 ([page_cache_service.dart](file:///workspace/lib/services/page_cache_service.dart)):
                - \`savePlayRecord\` 普通 mode 也**先 await 一份 local**
                  (SharedPreferences 写入毫秒级, 1-2s 内能完成)
                  + 后 await ApiService 网络写云端 (best-effort)
                - \`getPlayRecordsDirect\` 网络失败时 fallback local,
                  下次启动从 local 兜底拿到最新进度
                - local 始终保持最新 (每次 save 覆盖), 不污染普通 mode 用户体验
                  (普通 mode 用户日常从云端拉, local 仅作 fallback)

            - **修复 resume 场景下立即 save 覆盖云端进度 (根因修复)**
              - 现象: 看到 12 分钟, 正常返回详情页, 重开又从 0 开始
                (不是杀后台, 就是正常退出再进)
              - 根因 ([player_screen.dart](file:///workspace/lib/screens/player_screen.dart)):
