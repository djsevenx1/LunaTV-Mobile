              - 根因 ([player_screen.dart](file:///workspace/lib/screens/player_screen.dart)):
                - 正常流程: 用户看 → 返回键 → onPopInvoked(phase=playing) 已经
                  save 12 分钟 + stop player → phase=detail → 用户再返回 →
